master_process on;

worker_processes 1;

events {
    worker_connections 4096;
}

http {
    resolver ipv6=off 8.8.8.8;

    #access_log logs/access.log;
    access_log off;
    server_tokens off;

    keepalive_requests 10000000;

    server {
        listen 1980;
        server_name _;

        location /v1/chat/completions {
            default_type application/json;
            return 200 '{"id":"chatcmpl-mock","object":"chat.completion","created":1713123456,"model":"gpt-mock","choices":[{"index":0,"message":{"role":"assistant","content":"This is a high-performance mock response for testing API7 EE ai-proxy overhead."},"finish_reason":"stop"}],"usage":{"prompt_tokens":10,"completion_tokens":20,"total_tokens":30}}';
        }
    }
}